<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortcut Muscle-Memory Trainer</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --success-bg: #a6e3a1;
            --success-text: #1e1e2e;
            --error-bg: #f38ba8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        body.success {
            background-color: var(--success-bg);
            color: var(--success-text);
            }
        body.error {
            background-color: var(--error-bg);
            color: var(--success-text);
            }

        .container {
            max-width: 600px;
            padding: 2rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #task-prompt {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 2rem 0;
        }

        #status {
            font-size: 1.2rem;
            min-height: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .progress {
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .disclaimer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Shortcut Trainer</h1>
        <div id="status">Press Start to Begin</div>
        <div id="task-prompt">Ready?</div>
        <div class="progress">
            <span id="current-step">0</span> / <span id="total-steps">0</span>
        </div>
    </div>

    <div class="disclaimer">
        Note: Highly restricted system/browser shortcuts (like Alt+Tab or Ctrl+W) cannot be captured by browser
        JavaScript.
    </div>

    <script>
        const shortcuts = [
      { task: "Copy selected text", ctrlKey: true, shiftKey: false, altKey: false, key: 'c', comboName: "Ctrl + C" },
      { task: "Paste copied text", ctrlKey: true, shiftKey: false, altKey: false, key: 'v', comboName: "Ctrl + V" },
      { task: "Select all text", ctrlKey: true, shiftKey: false, altKey: false, key: 'a', comboName: "Ctrl + A" },
      { task: "Save document", ctrlKey: true, shiftKey: false, altKey: false, key: 's', comboName: "Ctrl + S" }
    ];

    let currentIndex = 0;
    let isTraining = false;

    const taskPromptEl = document.getElementById('task-prompt');
    const statusEl = document.getElementById('status');
    const currentStepEl = document.getElementById('current-step');
    const totalStepsEl = document.getElementById('total-steps');

    function loadShortcut(index) {
      if (index >= shortcuts.length) {
        taskPromptEl.textContent = "Training Complete! 🎉";
        statusEl.textContent = "Refresh to restart.";
        isTraining = false;
        return;
      }
      
      const currentShortcut = shortcuts[index];
      taskPromptEl.textContent = currentShortcut.task;
      statusEl.textContent = "Press the shortcut...";
      currentStepEl.textContent = index + 1;
    }

    function init() {
      totalStepsEl.textContent = shortcuts.length;
      loadShortcut(0);
      isTraining = true;
    }

    init();

    window.addEventListener('keydown', (event) => {
      if (!isTraining) return;

      // Ignore standalone modifier keys
      if (['Control', 'Shift', 'Alt', 'Meta'].includes(event.key)) {
        return; 
      }

      // Prevent browser default actions
      event.preventDefault();

      const currentTarget = shortcuts[currentIndex];

      // Validate exactly which keys are pressed
      const isCtrlMatch = event.ctrlKey === currentTarget.ctrlKey;
      const isShiftMatch = event.shiftKey === currentTarget.shiftKey;
      const isAltMatch = event.altKey === currentTarget.altKey;
      const isKeyMatch = event.key.toLowerCase() === currentTarget.key.toLowerCase();

      if (isCtrlMatch && isShiftMatch && isAltMatch && isKeyMatch) {
        statusEl.textContent = `Correct! ${currentTarget.comboName}`;
        currentIndex++;
        
        // Wait briefly before showing next prompt
        setTimeout(() => {
          loadShortcut(currentIndex);
        }, 300);
      } else {
        statusEl.textContent = "Oops, wrong combo! Try again.";
      }
    });
    </script>
</body>

</html>
