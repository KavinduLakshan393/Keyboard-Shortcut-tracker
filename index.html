<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortcut Muscle-Memory Trainer</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #task-prompt {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 2rem 0;
        }

        #status {
            font-size: 1.2rem;
            min-height: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .progress {
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .disclaimer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Shortcut Trainer</h1>
        <div id="status">Press Start to Begin</div>
        <div id="task-prompt">Ready?</div>
        <div class="progress">
            <span id="current-step">0</span> / <span id="total-steps">0</span>
        </div>
    </div>

    <div class="disclaimer">
        Note: Highly restricted system/browser shortcuts (like Alt+Tab or Ctrl+W) cannot be captured by browser
        JavaScript.
    </div>

    <script>
        // JavaScript will go here
    </script>
</body>

</html>
